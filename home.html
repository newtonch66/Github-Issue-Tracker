        * {

<body>
    <!-- navbar Section -->
    <header class=" flex items-center bg-slate-100 shadow justify-between px-10">
        <div class="flex items-center gap-3 py-3">
            <div class="">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <div>
                <h2 class="text-4xl font-bold">GitHub Issues Tracker</h2>
            </div>
        </div>
        <div class="flex gap-5">
            <div class=" ">
                <label class="input">
                    <i class="font-bold text-gray-500 fa-solid fa-magnifying-glass"></i>
                    <input id="search-input" class="text-xl font-semibold" type="Search" required placeholder="Search issues..." />
                </label>
            </div>

            <div>
                <button class="btn btn-primary text-xl font-bold"><i class="fa-solid fa-plus"></i>New Issue</button>
            </div>
        </div>

    </header>

    <!-- all button section -->
    <section class=" w-11/12 mx-auto mt-20 shadow p-4  bg-slate-100 rounded ">
        <div class="">
            <button id="btn-all" class="btn btn-primary filter-btn">All</button>
            <button id="btn-open" class="btn filter-btn">Open</button>
            <button id="btn-closed" class="btn filter-btn">Closed</button>
        </div>
    </section>

    <!-- 50 issue section -->
    <section class=" w-11/12 mx-auto flex justify-between  bg-slate-100 mt-5 rounded shadow ">
        <div class=" flex p-5 gap-3 w-[50%]">
            <img src="./assets/Aperture.png" alt="">
            <div>
                <h3 class="text-xl font-semibold">50 Issues</h3>
                <p class=" text-gray-400">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex px-3 gap-5 w-[50%] justify-end">
            <div class="flex items-center gap-2">
                <div><img src="./assets/Open-Status.png" alt=""></div>
                <div>
                    <h3>Open</h3>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <div><img src="./assets/Closed- Status .png" alt=""></div>
                <div>
                    <h3>Close</h3>
                </div>
            </div>

        </div>
    </section>



    <!-- Card section -->
    <section id="load-data" class="w-11/12 mx-auto grid grid-cols-4 gap-5 p-5 mt-2">

  <section>
   
<div id="issue-modal" class="hidden fixed inset-0  bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-11/12 md:w-2/5 p-8">

        <h2 id="modal-title" class="text-2xl font-bold mb-3"></h2>

        <div class="flex items-center gap-3 mb-4">
            <span id="modal-status"></span>
            <span id="modal-author" class="text-gray-400 text-sm"></span>
        </div>

       
        <div id="modal-labels" class="flex gap-2 flex-wrap mb-5"></div>

        
        <p id="modal-description" class="text-gray-600 mb-6"></p>

    
        <div class="flex gap-4 bg-gray-100 rounded-lg p-4 mb-6">
            <div class="w-1/2">
                <p class="text-gray-400 text-sm mb-1">Assignee:</p>
                <p id="modal-assignee" class="font-bold"></p>
            </div>
            <div class="w-1/2">
                <p class="text-gray-400 text-sm mb-1">Priority:</p>
                <span id="modal-priority"></span>
            </div>
        </div>

        <div class="flex justify-end">
            <button onclick="closeModal()" class="btn btn-primary px-8">Close</button>
        </div>
    </div>
</div>
