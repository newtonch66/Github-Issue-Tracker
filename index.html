<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Daisy & Tailwind Link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome Link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--Geist Font Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>Login | Github-Issue-Tracker</title>

    <!-- css -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <!-- Login Page Section -->
    <section class=" sm:w-full md:w-4/12 mx-auto bg-slate-100 rounded-md  shadow-lg p-6 mt-16">
        <div class="">
            <img class="mx-auto block" src="./assets/github-logo.png" alt="">
        </div>
        <div class=" text-center mb-10">
            <h2 class="text-4xl font-bold py-3">GitHub Issues Tracker</h2>
            <p class="text-gray-400 font-semibold">Sign in to manage your issues</p>
        </div>

        <div class="space-y-5">
                <div class="space-y-2">
                    <label class="label text-xl font-semibold text-neutral">Username</label>
                <input id="username-input" type="username" class="input w-full rounded-lg" placeholder="Enter Username" />
                </div>

               <div class="space-y-2">
                 <label class="label text-xl font-semibold text-neutral">Password</label>
                <input id="password-input" type="password" class="input w-full rounded-lg" placeholder="Enter Password" />
               </div>

                <div>
                    <button id="sign-btn" class="btn btn-primary mt-4 w-full">Sign In</button>
                </div>
        </div>
    </section>

    <script src="./script/script.js"></script>
</body>

</html>
