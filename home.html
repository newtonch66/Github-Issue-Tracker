<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--Geist Font Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <title>Home | Github-Issue-Tracker</title>

    <!-- css -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <!-- navbar Section -->
    <header class="flex flex-wrap items-center bg-slate-100 shadow justify-between px-4 md:px-10 py-2 gap-3">
        <div class="flex items-center gap-3 py-2">
            <div>
                <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-8 h-8 md:w-10 md:h-10">
            </div>
            <div>
                <h2 class="text-2xl md:text-4xl font-bold">GitHub Issues Tracker</h2>
            </div>
        </div>
        <div class="flex flex-wrap gap-3 w-full md:w-auto">
            <div class="flex-1 md:flex-none">
                <label class="input w-full">
                    <i class="font-bold text-gray-500 fa-solid fa-magnifying-glass"></i>
                    <input id="search-input" class="text-base md:text-xl font-semibold w-full" type="Search" required
                        placeholder="Search issues..." />
                </label>
            </div>
            <div>
                <button class="btn btn-primary text-base md:text-xl font-bold w-full md:w-auto">
                    <i class="fa-solid fa-plus"></i> New Issue
                </button>
            </div>
        </div>
    </header>

    <!-- all button section -->
    <section class="w-11/12 mx-auto mt-10 md:mt-20 shadow p-4 bg-slate-100 rounded">
        <div class="flex flex-wrap gap-2">
            <button id="btn-all" class="btn btn-primary filter-btn">All</button>
            <button id="btn-open" class="btn filter-btn">Open</button>
            <button id="btn-closed" class="btn filter-btn">Closed</button>
        </div>
    </section>

    <!-- 50 issue section -->
    <section class="w-11/12 mx-auto flex flex-col sm:flex-row justify-between bg-slate-100 mt-5 rounded shadow">
        <div class="flex p-4 md:p-5 gap-3 w-full sm:w-[50%]">
            <img src="./assets/Aperture.png" alt="" class="w-8 h-8 md:w-10 md:h-10 self-start mt-1">
            <div>
                <h3 class="text-lg md:text-xl font-semibold">50 Issues</h3>
                <p class="text-gray-400 text-sm md:text-base">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex px-4 md:px-3 pb-4 sm:pb-0 gap-4 md:gap-5 w-full sm:w-[50%] sm:justify-end items-center">
            <div class="flex items-center gap-2">
                <img src="./assets/Open-Status.png" alt="" class="w-5 h-5">
                <h3 class="text-sm md:text-base">Open</h3>
            </div>
            <div class="flex items-center gap-2">
                <img src="./assets/Closed- Status .png" alt="" class="w-5 h-5">
                <h3 class="text-sm md:text-base">Close</h3>
            </div>
        </div>
    </section>



    <!-- Card section -->
    <section id="load-data" class="w-11/12 sm:grid grid-cols-2  mx-auto  md:grid-cols-4 gap-5 p-5 mt-2">

            </div>  -->

    </section>

<!-- modal section  -->
    <section>

        <div id="issue-modal" class="hidden fixed inset-0  bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-xl shadow-xl w-11/12 md:w-2/5 p-8">

                <h2 id="modal-title" class="text-2xl font-bold mb-3"></h2>

                <div class="flex items-center gap-3 mb-4">
                    <span id="modal-status"></span>
                    <span id="modal-author" class="text-gray-400 text-sm"></span>
                </div>


                <div id="modal-labels" class="flex gap-2 flex-wrap mb-5"></div>


                <p id="modal-description" class="text-gray-600 mb-6"></p>


                <div class="flex gap-4 bg-gray-100 rounded-lg p-4 mb-6">
                    <div class="w-1/2">
                        <p class="text-gray-400 text-sm mb-1">Assignee:</p>
                        <p id="modal-assignee" class="font-bold"></p>
                    </div>
                    <div class="w-1/2">
                        <p class="text-gray-400 text-sm mb-1">Priority:</p>
                        <span id="modal-priority"></span>
                    </div>
                </div>

                <div class="flex justify-end">
                    <button onclick="closeModal()" class="btn btn-primary px-8">Close</button>
                </div>
            </div>
        </div>
    </section>







    <script src="./script/home.js"></script>
